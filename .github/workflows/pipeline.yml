name: Apartment Pipeline

on:
  schedule:
    #       min hour day month dow
    # 7am ET  = 11:00 UTC (EDT, UTC-4)
    # 12pm ET = 16:00 UTC
    # 5pm ET  = 21:00 UTC
    # 10pm ET = 02:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 16 * * *"
    - cron: "0 21 * * *"
    - cron: "0 2  * * *"

  # One-click manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape (leave blank for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — no DB writes"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Install Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALERT_EMAIL:             ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD:    ${{ secrets.ALERT_EMAIL_PASSWORD }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.source }}" ]; then
            ARGS="$ARGS --source ${{ github.event.inputs.source }}"
          fi
          python main.py $ARGS

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_number }}
          path: pipeline/run.log
          retention-days: 14
