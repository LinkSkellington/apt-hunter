<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apt Hunter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
    --border:#333;--border2:#444;
    --text:#f0f0f0;--text2:#aaa;--text3:#666;
    --accent:#e8ff47;--accent-dim:#b8cc30;
    --hot:#ff4444;--warm:#ff8c00;--ok:#4caf50;
    --elite:#ffd700;--top:#ff6b35;--close:#5b9bd5;
    --panel-w:420px;
    --header-h:56px;
    --filters-h:52px;
  }
  html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

  /* ── HEADER ── */
  #header{
    position:fixed;top:0;left:0;right:0;height:var(--header-h);
    background:var(--bg);border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 16px;gap:12px;z-index:1000;
  }
  #logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-0.5px;white-space:nowrap}
  #criteria{font-size:12px;color:var(--text3);white-space:nowrap}
  #header-spacer{flex:1}
  #identity-badge{
    font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;
    background:var(--surface2);border:1px solid var(--border2);color:var(--text2);
    cursor:pointer;white-space:nowrap;
  }
  #identity-badge.alex{background:#1a2a1a;border-color:#4caf50;color:#4caf50}
  #identity-badge.liz{background:#2a1a2a;border-color:#e91e8c;color:#e91e8c}
  #refresh-btn{
    font-size:12px;padding:4px 12px;border-radius:20px;
    background:transparent;border:1px solid var(--border2);color:var(--text3);
    cursor:pointer;font-family:'DM Sans',sans-serif;
  }
  #refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* ── FILTER BAR ── */
  #filterbar{
    position:fixed;top:var(--header-h);left:0;right:0;height:var(--filters-h);
    background:var(--bg);border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 12px;gap:8px;
    overflow-x:auto;overflow-y:hidden;z-index:999;
  }
  #filterbar::-webkit-scrollbar{display:none}
  .filter-chip{
    flex-shrink:0;font-size:12px;font-weight:500;padding:5px 12px;
    border-radius:20px;border:1px solid var(--border2);background:var(--surface);
    color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;
    font-family:'DM Sans',sans-serif;
  }
  .filter-chip:hover{border-color:var(--text2);color:var(--text)}
  .filter-chip.active{background:var(--accent);border-color:var(--accent);color:#000}
  .filter-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 4px}
  .filter-count{
    display:inline-block;font-size:10px;background:rgba(255,255,255,.15);
    border-radius:10px;padding:1px 6px;margin-left:4px;
  }
  .filter-chip.active .filter-count{background:rgba(0,0,0,.2)}

  /* ── LAYOUT ── */
  #app{
    position:fixed;
    top:calc(var(--header-h) + var(--filters-h));
    left:0;right:0;bottom:0;
    display:flex;
  }

  /* ── LISTING PANEL ── */
  #panel{
    width:var(--panel-w);min-width:var(--panel-w);
    background:var(--surface);
    display:flex;flex-direction:column;
    border-right:1px solid var(--border);
    transition:width .2s ease,min-width .2s ease;
    position:relative;z-index:10;
  }
  #panel.collapsed{width:0;min-width:0;overflow:hidden}
  #panel-toggle{
    position:absolute;top:50%;right:-16px;transform:translateY(-50%);
    width:16px;height:48px;background:var(--surface3);
    border:1px solid var(--border2);border-left:none;
    border-radius:0 6px 6px 0;
    cursor:pointer;z-index:11;display:flex;align-items:center;justify-content:center;
    color:var(--text3);font-size:10px;
  }
  #panel-toggle:hover{color:var(--text);background:var(--surface2)}

  #panel-header{
    padding:12px 16px 8px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  #result-count{font-size:13px;font-weight:500;color:var(--text2)}
  #sort-select{
    font-size:12px;background:var(--surface2);border:1px solid var(--border);
    color:var(--text2);padding:4px 8px;border-radius:6px;margin-top:6px;
    font-family:'DM Sans',sans-serif;cursor:pointer;
  }

  #listing-list{flex:1;overflow-y:auto;overflow-x:hidden}
  #listing-list::-webkit-scrollbar{width:4px}
  #listing-list::-webkit-scrollbar-track{background:transparent}
  #listing-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

  /* ── LISTING CARD ── */
  .listing-card{
    padding:14px 16px;border-bottom:1px solid var(--border);
    cursor:pointer;transition:background .12s;position:relative;
  }
  .listing-card:hover{background:var(--surface2)}
  .listing-card.selected{background:var(--surface2);border-left:3px solid var(--accent)}
  .listing-card.selected{padding-left:13px}

  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card-price{font-size:17px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
  .card-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
  .badge{
    font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;
    white-space:nowrap;
  }
  .badge-elite{background:#2a2200;color:var(--elite);border:1px solid #4a3c00}
  .badge-top{background:#2a1500;color:var(--top);border:1px solid #4a2800}
  .badge-close{background:#0d1a2a;color:var(--close);border:1px solid #1a3050}
  .badge-nofee{background:#0d2a0d;color:#4caf50;border:1px solid #1a4a1a}
  .badge-fav{background:#2a1a00;color:#ffb800;border:1px solid #4a3200}
  .badge-review-alex{background:#0d2a0d;color:#4caf50;border:1px solid #1a4a1a}
  .badge-review-liz{background:#2a0d1a;color:#e91e8c;border:1px solid #4a1a30}
  .badge-new{background:#1a1a2a;color:var(--accent);border:1px solid #2a2a4a}

  .card-addr{font-size:13px;font-weight:500;color:var(--text);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .card-details{display:flex;gap:10px;margin-top:8px;font-size:12px;color:var(--text2)}
  .card-detail-item{display:flex;align-items:center;gap:3px}

  .card-actions{display:flex;gap:6px;margin-top:10px}
  .card-action{
    flex:1;padding:5px 0;font-size:12px;font-weight:500;
    background:var(--surface3);border:1px solid var(--border2);
    color:var(--text2);border-radius:6px;cursor:pointer;
    font-family:'DM Sans',sans-serif;transition:all .12s;text-align:center;
  }
  .card-action:hover{border-color:var(--text2);color:var(--text)}
  .card-action.active-fav{background:#2a1a00;border-color:#ffb800;color:#ffb800}
  .card-action.active-review{background:#0d2a0d;border-color:#4caf50;color:#4caf50}
  .card-action.dislike-btn:hover{background:#2a0d0d;border-color:#ff4444;color:#ff4444}

  /* ── MAP ── */
  #map-container{flex:1;position:relative}
  #map{width:100%;height:100%}

  /* ── MAP PINS ── */
  .map-pin{
    background:var(--surface);border:2px solid var(--border2);
    border-radius:20px;padding:3px 8px;
    font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
    color:var(--text);white-space:nowrap;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.5);
    transition:transform .1s;
  }
  .map-pin:hover{transform:scale(1.08);z-index:1000!important}
  .map-pin.pin-elite{background:#2a2200;border-color:var(--elite);color:var(--elite)}
  .map-pin.pin-top{background:#2a1500;border-color:var(--top);color:var(--top)}
  .map-pin.pin-close{background:#0d1a2a;border-color:var(--close);color:var(--close)}
  .map-pin.pin-fav{border-color:#ffb800}
  .map-pin.pin-selected{transform:scale(1.15);z-index:2000!important;border-width:3px}
  .pin-emoji{margin-right:3px;font-size:11px}

  /* ── NEIGHBORHOOD POLYGONS ── */
  /* Controlled via Leaflet L.polygon styles */

  /* ── DETAIL DRAWER ── */
  #detail-drawer{
    position:fixed;top:0;right:0;bottom:0;width:400px;
    background:var(--surface);border-left:1px solid var(--border2);
    z-index:2000;transform:translateX(100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  #detail-drawer.open{transform:translateX(0)}
  #detail-close{
    position:absolute;top:14px;left:14px;
    width:28px;height:28px;border-radius:50%;
    background:var(--surface3);border:1px solid var(--border2);
    color:var(--text2);cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  #detail-close:hover{color:var(--text)}
  #detail-scroll{flex:1;overflow-y:auto;padding:16px}
  #detail-scroll::-webkit-scrollbar{width:4px}
  #detail-scroll::-webkit-scrollbar-thumb{background:var(--border2)}

  .detail-price{font-size:26px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;margin-top:32px}
  .detail-addr{font-size:15px;font-weight:500;color:var(--text);margin-top:4px}
  .detail-sub{font-size:13px;color:var(--text3);margin-top:2px}
  .detail-actions{display:flex;gap:8px;margin-top:14px}
  .detail-action{
    flex:1;padding:8px;font-size:13px;font-weight:500;
    background:var(--surface3);border:1px solid var(--border2);
    color:var(--text2);border-radius:8px;cursor:pointer;
    font-family:'DM Sans',sans-serif;text-align:center;transition:all .12s;
  }
  .detail-action:hover{border-color:var(--text2);color:var(--text)}
  .detail-action.active-fav{background:#2a1a00;border-color:#ffb800;color:#ffb800}
  .detail-action.active-review{background:#0d2a0d;border-color:#4caf50;color:#4caf50}
  .detail-action.dislike-btn:hover{background:#2a0d0d;border-color:#ff4444;color:#ff4444}

  .detail-section{margin-top:18px}
  .detail-section-title{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .detail-stat{background:var(--surface2);border-radius:8px;padding:10px 12px}
  .detail-stat-label{font-size:11px;color:var(--text3);margin-bottom:2px}
  .detail-stat-val{font-size:14px;font-weight:500;color:var(--text)}

  .detail-amenities{display:flex;flex-wrap:wrap;gap:6px}
  .amenity-tag{
    font-size:11px;padding:3px 9px;border-radius:12px;
    background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  }
  .amenity-tag.has{border-color:#2d5a2d;background:#0d1a0d;color:#4caf50}

  .detail-score-bar{display:flex;flex-direction:column;gap:6px}
  .score-row{display:flex;align-items:center;gap:8px;font-size:12px}
  .score-label{color:var(--text3);width:110px;flex-shrink:0}
  .score-track{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
  .score-fill{height:100%;background:var(--accent);border-radius:2px}
  .score-val{color:var(--text2);width:28px;text-align:right;font-family:'DM Mono',monospace}

  .detail-link{
    display:block;margin-top:16px;padding:10px;text-align:center;
    background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
    color:var(--accent);font-size:13px;font-weight:500;text-decoration:none;
    transition:border-color .12s;
  }
  .detail-link:hover{border-color:var(--accent)}

  .detail-notes{
    width:100%;margin-top:12px;padding:10px;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:13px;
    font-family:'DM Sans',sans-serif;resize:vertical;min-height:80px;
  }
  .detail-notes:focus{outline:none;border-color:var(--border2)}

  .detail-status-select{
    width:100%;padding:8px 10px;margin-top:6px;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:13px;
    font-family:'DM Sans',sans-serif;cursor:pointer;
  }

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--surface2);border:1px solid var(--border2);
    border-radius:10px;padding:10px 20px;
    font-size:13px;color:var(--text);
    z-index:9999;transition:transform .2s ease;white-space:nowrap;
    display:flex;align-items:center;gap:12px;
  }
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast-undo{
    font-size:12px;color:var(--accent);cursor:pointer;font-weight:500;
  }

  /* ── IDENTITY MODAL ── */
  #identity-modal{
    position:fixed;inset:0;background:rgba(0,0,0,.75);
    z-index:9998;display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  #identity-modal.open{opacity:1;pointer-events:auto}
  .modal-box{
    background:var(--surface);border:1px solid var(--border2);
    border-radius:16px;padding:28px;width:320px;text-align:center;
  }
  .modal-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px}
  .modal-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
  .modal-options{display:flex;flex-direction:column;gap:8px}
  .modal-option{
    padding:11px;border-radius:10px;border:1px solid var(--border2);
    background:var(--surface2);cursor:pointer;font-size:14px;font-weight:500;
    color:var(--text);font-family:'DM Sans',sans-serif;transition:all .12s;
  }
  .modal-option:hover{border-color:var(--accent);color:var(--accent)}
  .modal-skip{
    margin-top:10px;font-size:12px;color:var(--text3);cursor:pointer;
  }
  .modal-skip:hover{color:var(--text2)}

  /* ── LOADING ── */
  #loading{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:9999;gap:12px;
  }
  #loading.hidden{display:none}
  .loading-logo{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent)}
  .loading-sub{font-size:13px;color:var(--text3)}
  .loading-bar{width:200px;height:2px;background:var(--surface3);border-radius:1px;overflow:hidden}
  .loading-fill{height:100%;background:var(--accent);border-radius:1px;animation:fill 1.8s ease-in-out infinite}
  @keyframes fill{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}

  /* ── MOBILE ── */
  @media(max-width:700px){
    :root{--panel-w:100vw}
    #panel{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%!important;min-width:0!important;height:50vh;border-right:none;border-top:1px solid var(--border2)}
    #panel.collapsed{height:0}
    #panel-toggle{top:auto;bottom:calc(50vh);right:16px;width:48px;height:28px;transform:none;border-radius:6px 6px 0 0;border-bottom:none}
    #map-container{height:calc(100% - 50vh)}
    #detail-drawer{width:100%;left:0;right:0}
    #app{flex-direction:column}
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">apt hunter</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-sub">loading listings…</div>
</div>

<!-- HEADER -->
<div id="header">
  <div id="logo">apt hunter</div>
  <div id="criteria">brooklyn + hoboken · jun 1 · 2bd+ · ≤$9k</div>
  <div id="header-spacer"></div>
  <button id="refresh-btn" onclick="loadListings()">↻ refresh</button>
  <div id="identity-badge" onclick="openIdentityModal()">who are you?</div>
</div>

<!-- FILTER BAR -->
<div id="filterbar">
  <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">all active <span class="filter-count" id="fc-all">—</span></button>
  <button class="filter-chip" data-filter="favorites" onclick="setFilter('favorites',this)">⭐ favorites <span class="filter-count" id="fc-fav">—</span></button>
  <button class="filter-chip" data-filter="review" onclick="setFilter('review',this)">👀 for review <span class="filter-count" id="fc-review">—</span></button>
  <button class="filter-chip" data-filter="new" onclick="setFilter('new',this)">🆕 new today <span class="filter-count" id="fc-new">—</span></button>
  <button class="filter-chip" data-filter="elite" onclick="setFilter('elite',this)">🏆 elite <span class="filter-count" id="fc-elite">—</span></button>
  <button class="filter-chip" data-filter="top" onclick="setFilter('top',this)">🔥 top picks <span class="filter-count" id="fc-top">—</span></button>
  <button class="filter-chip" data-filter="close" onclick="setFilter('close',this)">💪 so close <span class="filter-count" id="fc-close">—</span></button>
  <button class="filter-chip" data-filter="rejected" onclick="setFilter('rejected',this)">🚫 rejected <span class="filter-count" id="fc-rejected">—</span></button>
  <div class="filter-sep"></div>
  <button class="filter-chip" data-hood="all" onclick="setHood('all',this)">all areas</button>
  <button class="filter-chip" data-hood="brooklyn heights" onclick="setHood('brooklyn heights',this)">bk heights</button>
  <button class="filter-chip" data-hood="williamsburg" onclick="setHood('williamsburg',this)">williamsburg</button>
  <button class="filter-chip" data-hood="greenpoint" onclick="setHood('greenpoint',this)">greenpoint</button>
  <button class="filter-chip" data-hood="park slope" onclick="setHood('park slope',this)">park slope</button>
  <button class="filter-chip" data-hood="carroll gardens" onclick="setHood('carroll gardens',this)">carroll gdns</button>
  <button class="filter-chip" data-hood="hoboken" onclick="setHood('hoboken',this)">hoboken</button>
  <button class="filter-chip" data-hood="hunters point lic" onclick="setHood('hunters point lic',this)">hunters pt lic</button>
  <div class="filter-sep"></div>
  <button class="filter-chip" data-commute="45" onclick="toggleCommuteFilter(this)">≤ 45 min commute</button>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- LISTING PANEL -->
  <div id="panel">
    <div id="panel-toggle" onclick="togglePanel()">◀</div>
    <div id="panel-header">
      <div id="result-count">loading…</div>
      <select id="sort-select" onchange="applyFilters()">
        <option value="score">sort: best match</option>
        <option value="price_asc">sort: price low→high</option>
        <option value="price_desc">sort: price high→low</option>
        <option value="newest">sort: newest first</option>
        <option value="commute">sort: commute</option>
      </select>
    </div>
    <div id="listing-list"></div>
  </div>

  <!-- MAP -->
  <div id="map-container">
    <div id="map"></div>
  </div>

</div>

<!-- DETAIL DRAWER -->
<div id="detail-drawer">
  <div id="detail-close" onclick="closeDetail()">×</div>
  <div id="detail-scroll"></div>
</div>

<!-- TOAST -->
<div id="toast"><span id="toast-msg"></span><span id="toast-undo" onclick="undoDislike()">undo</span></div>

<!-- IDENTITY MODAL -->
<div id="identity-modal">
  <div class="modal-box">
    <div class="modal-title">who are you?</div>
    <div class="modal-sub">saved across all your devices</div>
    <div class="modal-options">
      <button class="modal-option" onclick="setIdentity('Alex')">Alex</button>
      <button class="modal-option" onclick="setIdentity('Liz')">Liz</button>
    </div>
    <div class="modal-skip" onclick="setIdentity(null)">just browsing (skip)</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://lexlvpwtffkarcahszrk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_9knEOLQSWF4PW6GL2Mye8Q_CXTvkDNC';

// ── STATE ────────────────────────────────────────────────────────────────────
let allListings = [];
let filtered = [];
let selectedId = null;
let currentFilter = 'all';
let currentHood = 'all';
let commuteFilter = false;
let panelOpen = true;
let identity = localStorage.getItem('apt_identity') || null;
let pendingDislike = null;
let toastTimer = null;
let markers = {};
let map, markerLayer;

// ── SUPABASE ─────────────────────────────────────────────────────────────────
async function sb(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadListings() {
  try {
    const data = await sb('listings?select=*&is_disliked=eq.false&order=score_raw.desc.nullslast&limit=500');
    allListings = data || [];
    applyFilters();
    updateCounts();
  } catch(e) {
    console.error('Load error:', e);
  }
}

async function toggleFavorite(id, e) {
  if (e) e.stopPropagation();
  if (!identity) { openIdentityModal(); return; }
  const l = allListings.find(x=>x.id===id);
  if (!l) return;
  const newVal = !l.is_favorite;
  l.is_favorite = newVal;
  await sb(`listings?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({is_favorite:newVal}), prefer:'return=minimal'});
  applyFilters();
}

async function toggleReview(id, e) {
  if (e) e.stopPropagation();
  if (!identity) { openIdentityModal(); return; }
  const l = allListings.find(x=>x.id===id);
  if (!l) return;
  const newVal = !l.is_reviewed;
  l.is_reviewed = newVal;
  l.reviewer_name = newVal ? identity : null;
  await sb(`listings?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({is_reviewed:newVal, reviewer_name: newVal ? identity : null}), prefer:'return=minimal'});
  applyFilters();
}

async function doDislike(id, e) {
  if (e) e.stopPropagation();
  if (!identity) { openIdentityModal(); return; }
  const l = allListings.find(x=>x.id===id);
  if (!l) return;
  pendingDislike = {id, listing: {...l}};
  l.is_disliked = true;
  l.disliked_at = new Date().toISOString();
  if (selectedId === id) closeDetail();
  applyFilters();
  showToast(`removed from view`, true);
  toastTimer = setTimeout(async () => {
    await sb(`listings?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({is_disliked:true, disliked_at: new Date().toISOString()}), prefer:'return=minimal'});
    pendingDislike = null;
  }, 6000);
}

async function undoDislike() {
  if (!pendingDislike) return;
  clearTimeout(toastTimer);
  const l = allListings.find(x=>x.id===pendingDislike.id);
  if (l) { l.is_disliked = false; l.disliked_at = null; }
  pendingDislike = null;
  applyFilters();
  hideToast();
}

async function saveNotes(id, notes) {
  await sb(`listings?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({notes}), prefer:'return=minimal'});
}

async function saveStatus(id, status) {
  await sb(`listings?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({status}), prefer:'return=minimal'});
  const l = allListings.find(x=>x.id===id);
  if (l) l.status = status;
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setHood(h, el) {
  currentHood = h;
  document.querySelectorAll('[data-hood]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function toggleCommuteFilter(el) {
  commuteFilter = !commuteFilter;
  el.classList.toggle('active', commuteFilter);
  applyFilters();
}

function applyFilters() {
  const sort = document.getElementById('sort-select').value;
  let result = allListings.filter(l => {
    if (currentFilter === 'all' && l.is_disliked) return false;
    if (currentFilter === 'favorites') return l.is_favorite && !l.is_disliked;
    if (currentFilter === 'review') return l.is_reviewed && !l.is_disliked;
    if (currentFilter === 'new') {
      if (l.is_disliked) return false;
      const d = new Date(l.first_seen);
      const now = new Date();
      return (now - d) < 24 * 3600 * 1000;
    }
    if (currentFilter === 'elite') return !l.is_disliked && l.score_raw >= 68;
    if (currentFilter === 'top') return !l.is_disliked && l.score_raw >= 65 && l.score_raw < 68;
    if (currentFilter === 'close') return !l.is_disliked && l.score_raw >= 45 && l.score_raw < 65;
    if (currentFilter === 'rejected') return l.is_disliked;
    return !l.is_disliked;
  });

  if (currentHood !== 'all') {
    result = result.filter(l => (l.neighborhood||'').toLowerCase().includes(currentHood));
  }

  if (commuteFilter) {
    result = result.filter(l => l.commute_minutes && l.commute_minutes <= 45);
  }

  if (sort === 'price_asc') result.sort((a,b) => (a.price||0)-(b.price||0));
  else if (sort === 'price_desc') result.sort((a,b) => (b.price||0)-(a.price||0));
  else if (sort === 'newest') result.sort((a,b) => new Date(b.first_seen)-new Date(a.first_seen));
  else if (sort === 'commute') result.sort((a,b) => (a.commute_minutes||999)-(b.commute_minutes||999));
  else result.sort((a,b) => (b.score_raw||0)-(a.score_raw||0));

  filtered = result;
  renderList();
  renderMapPins();
  document.getElementById('result-count').textContent = `${filtered.length} listing${filtered.length!==1?'s':''}`;
  document.getElementById('loading').classList.add('hidden');
}

function updateCounts() {
  const active = allListings.filter(l=>!l.is_disliked);
  document.getElementById('fc-all').textContent = active.length;
  document.getElementById('fc-fav').textContent = active.filter(l=>l.is_favorite).length;
  document.getElementById('fc-review').textContent = active.filter(l=>l.is_reviewed).length;
  const now = new Date();
  document.getElementById('fc-new').textContent = active.filter(l=>(now-new Date(l.first_seen))<86400000).length;
  document.getElementById('fc-elite').textContent = active.filter(l=>l.score_raw>=68).length;
  document.getElementById('fc-top').textContent = active.filter(l=>l.score_raw>=65&&l.score_raw<68).length;
  document.getElementById('fc-close').textContent = active.filter(l=>l.score_raw>=45&&l.score_raw<65).length;
  document.getElementById('fc-rejected').textContent = allListings.filter(l=>l.is_disliked).length;
}

// ── RENDERING ────────────────────────────────────────────────────────────────
function tierClass(score) {
  if (!score) return 'close';
  if (score >= 68) return 'elite';
  if (score >= 65) return 'top';
  if (score >= 45) return 'close';
  return '';
}

function tierBadge(l) {
  const s = l.score_raw;
  if (!s) return '';
  if (s >= 68) return '<span class="badge badge-elite">🏆 elite</span>';
  if (s >= 65) return '<span class="badge badge-top">🔥 top pick</span>';
  if (s >= 45) return '<span class="badge badge-close">💪 so close</span>';
  return '';
}

function reviewBadge(l) {
  if (!l.is_reviewed) return '';
  if (l.reviewer_name === 'Alex') return '<span class="badge badge-review-alex">👀 Alex to review</span>';
  if (l.reviewer_name === 'Liz') return '<span class="badge badge-review-liz">👀 Liz to review</span>';
  return '<span class="badge badge-review-alex">👀 for review</span>';
}

function formatPrice(p) {
  if (!p) return '—';
  return '$' + p.toLocaleString();
}

function renderList() {
  const list = document.getElementById('listing-list');
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--text3);font-size:13px">no listings match these filters</div>';
    return;
  }
  list.innerHTML = filtered.map(l => {
    const tc = tierClass(l.score_raw);
    const isSel = l.id === selectedId;
    const beds = l.bedrooms != null ? l.bedrooms + 'bd' : '—';
    const baths = l.bathrooms != null ? l.bathrooms + 'ba' : '—';
    const sqft = l.sqft ? l.sqft.toLocaleString() + ' sqft' : '';
    const commute = l.commute_minutes ? l.commute_minutes + ' min' : '';
    const daysSince = l.first_seen ? Math.floor((Date.now()-new Date(l.first_seen))/86400000) : null;
    const isNew = daysSince !== null && daysSince < 1;
    return `<div class="listing-card${isSel?' selected':''}" id="card-${l.id}" onclick="selectListing('${l.id}')">
      <div class="card-top">
        <div class="card-price">${formatPrice(l.price)}<span style="font-size:11px;font-weight:400;color:var(--text3)">/mo</span></div>
        <div class="card-badges">
          ${tierBadge(l)}
          ${l.is_favorite ? '<span class="badge badge-fav">⭐ saved</span>' : ''}
          ${reviewBadge(l)}
          ${isNew ? '<span class="badge badge-new">new</span>' : ''}
          ${l.no_fee ? '<span class="badge badge-nofee">no fee</span>' : ''}
        </div>
      </div>
      <div class="card-addr">${l.address || '—'}</div>
      <div class="card-sub">${l.neighborhood || ''}</div>
      <div class="card-details">
        <span class="card-detail-item">${beds} / ${baths}</span>
        ${sqft ? `<span class="card-detail-item">· ${sqft}</span>` : ''}
        ${commute ? `<span class="card-detail-item">· 🚇 ${commute}</span>` : ''}
        ${l.score_raw ? `<span class="card-detail-item">· ${l.score_raw}pts</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="card-action${l.is_favorite?' active-fav':''}" onclick="toggleFavorite('${l.id}',event)">${l.is_favorite?'⭐ saved':'☆ save'}</button>
        <button class="card-action${l.is_reviewed?' active-review':''}" onclick="toggleReview('${l.id}',event)">${l.is_reviewed?'👀 reviewing':'👀 review'}</button>
        <button class="card-action dislike-btn" onclick="doDislike('${l.id}',event)">👎</button>
      </div>
    </div>`;
  }).join('');
}

// ── MAP ───────────────────────────────────────────────────────────────────────
const HOOD_CENTERS = {
  'brooklyn heights': [40.6960, -73.9937],
  'williamsburg':     [40.7135, -73.9566],
  'greenpoint':       [40.7299, -73.9519],
  'park slope':       [40.6713, -73.9797],
  'carroll gardens':  [40.6798, -73.9990],
  'hoboken':          [40.7440, -74.0324],
  'hunters point lic':[40.7440, -73.9484],
};

// Simplified neighborhood boundary polygons
const HOOD_POLYS = {
  'brooklyn heights': [[40.700,-73.999],[40.700,-73.988],[40.692,-73.988],[40.692,-73.999]],
  'williamsburg':     [[40.722,-73.968],[40.722,-73.944],[40.705,-73.944],[40.705,-73.968]],
  'greenpoint':       [[40.736,-73.964],[40.736,-73.942],[40.722,-73.942],[40.722,-73.964]],
  'park slope':       [[40.680,-73.990],[40.680,-73.970],[40.662,-73.970],[40.662,-73.990]],
  'carroll gardens':  [[40.690,-74.003],[40.690,-73.990],[40.678,-73.990],[40.678,-74.003]],
  'hoboken':          [[40.752,-74.042],[40.752,-74.022],[40.735,-74.022],[40.735,-74.042]],
  'hunters point lic':[[40.752,-73.958],[40.752,-73.938],[40.738,-73.938],[40.738,-73.958]],
};

const HOOD_COLORS = {
  'brooklyn heights': '#e8ff47',
  'williamsburg':     '#ff6b35',
  'greenpoint':       '#4caf50',
  'park slope':       '#5b9bd5',
  'carroll gardens':  '#e91e8c',
  'hoboken':          '#ffd700',
  'hunters point lic':'#b388ff',
};

let hoodPolygons = {};

function initMap() {
  map = L.map('map', {
    center: [40.710, -73.980],
    zoom: 13,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  markerLayer = L.layerGroup().addTo(map);

  // Draw neighborhood boundary polygons
  Object.entries(HOOD_POLYS).forEach(([hood, coords]) => {
    const color = HOOD_COLORS[hood] || '#888';
    const poly = L.polygon(coords, {
      color: color,
      weight: 2,
      opacity: 0.7,
      fillColor: color,
      fillOpacity: 0.06,
      dashArray: '4 4'
    }).addTo(map);
    poly.bindTooltip(hood, {permanent: false, className: 'hood-tooltip'});
    hoodPolygons[hood] = poly;
  });
}

function renderMapPins() {
  markerLayer.clearLayers();
  markers = {};

  filtered.forEach(l => {
    if (!l.lat && !l.longitude) {
      // Try to place based on neighborhood center
      const hood = (l.neighborhood||'').toLowerCase();
      const center = Object.entries(HOOD_CENTERS).find(([k]) => hood.includes(k.split(' ')[0]));
      if (center) {
        // Jitter slightly so pins don't stack
        l._lat = center[1][0] + (Math.random()-0.5)*0.008;
        l._lng = center[1][1] + (Math.random()-0.5)*0.008;
      } else return;
    } else {
      l._lat = l.lat || l.latitude;
      l._lng = l.lng || l.longitude;
    }

    const tc = tierClass(l.score_raw);
    const isSel = l.id === selectedId;
    const priceStr = l.price ? '$'+Math.round(l.price/100)*100/1000+'k' : '—';
    const emoji = l.score_raw >= 68 ? '🏆' : l.score_raw >= 65 ? '🔥' : l.is_favorite ? '⭐' : '';

    const el = document.createElement('div');
    el.className = `map-pin pin-${tc}${l.is_favorite?' pin-fav':''}${isSel?' pin-selected':''}`;
    el.innerHTML = `${emoji ? `<span class="pin-emoji">${emoji}</span>` : ''}${formatPrice(l.price)}`;

    const icon = L.divIcon({html: el, className: '', iconSize: null, iconAnchor: [0,0]});
    const marker = L.marker([l._lat, l._lng], {icon, zIndexOffset: tc==='elite'?1000:tc==='top'?500:0});
    marker.on('click', () => selectListing(l.id));
    marker.addTo(markerLayer);
    markers[l.id] = marker;
  });
}

// ── SELECTION ────────────────────────────────────────────────────────────────
function selectListing(id) {
  selectedId = id;
  const l = allListings.find(x=>x.id===id);
  if (!l) return;

  // Scroll card into view
  const card = document.getElementById('card-'+id);
  if (card) card.scrollIntoView({block:'nearest',behavior:'smooth'});

  // Re-render list to update selection highlight
  renderList();
  renderMapPins();

  // Pan map
  if (l._lat && l._lng) {
    map.panTo([l._lat, l._lng], {animate:true, duration:0.4});
  }

  // Open detail drawer
  openDetail(l);
}

// ── DETAIL DRAWER ────────────────────────────────────────────────────────────
function openDetail(l) {
  const drawer = document.getElementById('detail-drawer');
  const scroll = document.getElementById('detail-scroll');

  const tc = tierClass(l.score_raw);
  const beds = l.bedrooms != null ? l.bedrooms + ' bed' : '—';
  const baths = l.bathrooms != null ? l.bathrooms + ' bath' : '—';
  const sqft = l.sqft ? l.sqft.toLocaleString() + ' sqft' : 'sqft unknown';
  const floor = l.floor ? 'floor ' + l.floor : l.floor === 0 ? 'ground floor ⚠️' : 'floor unknown';
  const commute = l.commute_minutes ? l.commute_minutes + ' min to Midtown' : 'commute unknown';
  const daysOn = l.days_on_market != null ? l.days_on_market + ' days on market' : '';
  const score = l.score_raw || 0;

  const amenityList = [
    {key:'in_unit_laundry', label:'in-unit laundry'},
    {key:'dishwasher', label:'dishwasher'},
    {key:'gym', label:'gym'},
    {key:'doorman', label:'doorman'},
    {key:'elevator', label:'elevator'},
    {key:'parking', label:'parking'},
    {key:'storage', label:'storage'},
  ];

  scroll.innerHTML = `
    <div class="detail-price">${formatPrice(l.price)}<span style="font-size:14px;font-weight:400;color:var(--text3)">/mo</span></div>
    <div class="detail-addr">${l.address || '—'}</div>
    <div class="detail-sub">${l.neighborhood || ''} ${daysOn ? '· ' + daysOn : ''}</div>
    <div class="detail-actions">
      <button class="detail-action${l.is_favorite?' active-fav':''}" id="dd-fav" onclick="toggleFavorite('${l.id}',event);updateDetailBtns('${l.id}')">${l.is_favorite?'⭐ saved':'☆ save'}</button>
      <button class="detail-action${l.is_reviewed?' active-review':''}" id="dd-rev" onclick="toggleReview('${l.id}',event);updateDetailBtns('${l.id}')">${l.is_reviewed?'👀 reviewing':'👀 for review'}</button>
      <button class="detail-action dislike-btn" onclick="doDislike('${l.id}',event)">👎 pass</button>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">details</div>
      <div class="detail-grid">
        <div class="detail-stat"><div class="detail-stat-label">beds / baths</div><div class="detail-stat-val">${beds} / ${baths}</div></div>
        <div class="detail-stat"><div class="detail-stat-label">size</div><div class="detail-stat-val">${sqft}</div></div>
        <div class="detail-stat"><div class="detail-stat-label">floor</div><div class="detail-stat-val">${floor}</div></div>
        <div class="detail-stat"><div class="detail-stat-label">commute</div><div class="detail-stat-val">${commute}</div></div>
        <div class="detail-stat"><div class="detail-stat-label">heat</div><div class="detail-stat-val">${l.heat||'—'}</div></div>
        <div class="detail-stat"><div class="detail-stat-label">natural light</div><div class="detail-stat-val">${l.natural_light_confidence||'unknown'}</div></div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">score breakdown <span style="color:var(--text2);font-size:12px">${score}/100</span></div>
      <div class="detail-score-bar">
        ${[
          {label:'hard criteria', max:30, val: score>=45?25:10},
          {label:'commute', max:20, val: l.commute_minutes ? Math.max(0,20-Math.round((l.commute_minutes-30)/3)) : 10},
          {label:'neighborhood', max:15, val:12},
          {label:'sqft', max:10, val: l.sqft ? Math.min(10,Math.round(l.sqft/150)) : 0},
          {label:'natural light', max:10, val: l.natural_light_confidence==='high'?10:l.natural_light_confidence==='medium'?5:0},
          {label:'amenities', max:10, val: amenityList.filter(a=>l[a.key]).length * 1.5 | 0},
          {label:'building', max:5, val:3},
        ].map(row=>`
          <div class="score-row">
            <span class="score-label">${row.label}</span>
            <div class="score-track"><div class="score-fill" style="width:${Math.round(row.val/row.max*100)}%"></div></div>
            <span class="score-val">${row.val}/${row.max}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">amenities</div>
      <div class="detail-amenities">
        ${amenityList.map(a=>`<span class="amenity-tag${l[a.key]?' has':''}">${l[a.key]?'✓':''} ${a.label}</span>`).join('')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">status</div>
      <select class="detail-status-select" onchange="saveStatus('${l.id}',this.value)">
        ${['new','reviewing','saved','touring','contacted','rejected'].map(s=>`<option value="${s}"${l.status===s?' selected':''}>${s}</option>`).join('')}
      </select>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">notes</div>
      <textarea class="detail-notes" placeholder="add notes…" onblur="saveNotes('${l.id}',this.value)">${l.notes||''}</textarea>
    </div>

    <a class="detail-link" href="${l.primary_url||'https://streeteasy.com/for-rent/nyc'}" target="_blank">view listing ↗</a>
    <div style="height:24px"></div>
  `;

  drawer.classList.add('open');
}

function updateDetailBtns(id) {
  const l = allListings.find(x=>x.id===id);
  if (!l) return;
  const favBtn = document.getElementById('dd-fav');
  const revBtn = document.getElementById('dd-rev');
  if (favBtn) { favBtn.textContent = l.is_favorite?'⭐ saved':'☆ save'; favBtn.className = 'detail-action'+(l.is_favorite?' active-fav':''); }
  if (revBtn) { revBtn.textContent = l.is_reviewed?'👀 reviewing':'👀 for review'; revBtn.className = 'detail-action'+(l.is_reviewed?' active-review':''); }
}

function closeDetail() {
  document.getElementById('detail-drawer').classList.remove('open');
  selectedId = null;
  renderList();
  renderMapPins();
}

// ── PANEL TOGGLE ─────────────────────────────────────────────────────────────
function togglePanel() {
  panelOpen = !panelOpen;
  const panel = document.getElementById('panel');
  const toggle = document.getElementById('panel-toggle');
  panel.classList.toggle('collapsed', !panelOpen);
  toggle.textContent = panelOpen ? '◀' : '▶';
  setTimeout(()=>map.invalidateSize(), 220);
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, withUndo=false) {
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-undo').style.display = withUndo ? '' : 'none';
  document.getElementById('toast').classList.add('show');
  if (!withUndo) setTimeout(hideToast, 2500);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

// ── IDENTITY ─────────────────────────────────────────────────────────────────
function openIdentityModal() {
  document.getElementById('identity-modal').classList.add('open');
}
function setIdentity(name) {
  identity = name;
  if (name) localStorage.setItem('apt_identity', name);
  document.getElementById('identity-modal').classList.remove('open');
  const badge = document.getElementById('identity-badge');
  badge.textContent = name ? name : 'who are you?';
  badge.className = 'identity-badge' + (name === 'Alex' ? ' alex' : name === 'Liz' ? ' liz' : '');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  if (identity) setIdentity(identity);
  loadListings();
  setInterval(loadListings, 5 * 60 * 1000);
});
</script>
